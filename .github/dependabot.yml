version: 2

updates:
  - package-ecosystem: gomod
    directory: "/"
    schedule:
      interval: monthly
    cooldown:
      default-days: 7
    groups:
      gomod:
        patterns:
          - "*"  # Group all updates into a single larger pull request.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
    cooldown:
      default-days: 7
    groups:
      github-actions:
        patterns:
          - "*"  # Group all updates into a single larger pull request.
